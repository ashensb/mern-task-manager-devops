# This file is used to define the services that will be used in the application.
services:
  mongo:
    image: mongo:latest
    container_name: mongo_container
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    container_name: Task_backend_container
    ports:
      - "5000:5000"
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - MONGO_URL=mongodb://mongo:27017/test-users

  frontend:
    build: ./frontend
    container_name: Task_frontend_container
    ports:
      - "80:80"  # Nginx 80 port expoose
    depends_on:
      - backend
   

volumes:
  mongo_data: